services:
  mailcraft:
    image: ghcr.io/yourname/mailcraft:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
